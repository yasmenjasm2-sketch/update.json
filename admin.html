<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | الإدارة العليا</title>
    <style>
        :root {
            --bg-color: #0b1121;
            --card-bg: #151c2c;
            --primary: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --border-color: #334155;
        }

        body {
            font-family: system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .admin-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
        }

        h1 { font-size: 20px; text-align: center; margin-bottom: 24px; color: var(--primary); }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            background: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            color: white;
            outline: none;
        }

        .user-card {
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 15px;
            margin-top: 15px;
            display: none; /* يظهر عند البحث */
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
        }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 10px;
            padding: 10px 15px;
            font-weight: 600;
            transition: 0.2s;
            color: white;
        }

        .btn-search { background: var(--primary); }
        .btn-ban { background: var(--danger); margin-top: 10px; width: 100%; }
        .btn-remove { background: #64748b; margin-top: 10px; width: 100%; }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-item span { display: block; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>🛡️ لوحة التحكم في الاشتراكات</h1>

    <div class="stats">
        <div class="stat-item">المشتركين المسجلين<span id="totalUsers">0</span></div>
        <div class="stat-item">الأكواد المستخدمة<span id="totalCodes">0</span></div>
    </div>

    <div class="search-box">
        <input type="text" id="targetId" placeholder="أدخل Device ID للمستخدم...">
        <button class="btn btn-search" onclick="searchUser()">بحث</button>
    </div>

    <div id="resultCard" class="user-card">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <strong id="displayId" style="font-size: 13px; color: var(--primary);"></strong>
            <span id="displayStatus" class="status-badge"></span>
        </div>
        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 12px 0;">
        <p style="font-size: 14px; margin: 5px 0;">الكود المستخدم: <span id="displayCode" style="color:var(--primary)"></span></p>
        <p style="font-size: 14px; margin: 5px 0;">ينتهي في: <span id="displayExpiry"></span></p>
        
        <button class="btn btn-ban" onclick="toggleBan()">حظر الجهاز (BAN)</button>
        <button class="btn btn-remove" onclick="removeSubscription()">إزالة الاشتراك نهائياً</button>
    </div>
</div>

<script>
    // تحديث الإحصائيات عند الفتح
    function updateStats() {
        let userCount = 0;
        let codeCount = 0;
        for (let i = 0; i < localStorage.length; i++) {
            if (localStorage.key(i).startsWith("DEVICE_DB_")) userCount++;
            if (localStorage.key(i).startsWith("CODE_USED_")) codeCount++;
        }
        document.getElementById('totalUsers').innerText = userCount;
        document.getElementById('totalCodes').innerText = codeCount;
    }

    function searchUser() {
        const id = document.getElementById('targetId').value.trim();
        const data = localStorage.getItem("DEVICE_DB_" + id);
        const card = document.getElementById('resultCard');

        if (data) {
            const user = JSON.parse(data);
            card.style.display = 'block';
            document.getElementById('displayId').innerText = id;
            document.getElementById('displayCode').innerText = user.code || "بدون كود";
            document.getElementById('displayStatus').innerText = (user.status === 2) ? "محظور" : "نشط";
            document.getElementById('displayStatus').style.background = (user.status === 2) ? "var(--danger)" : "var(--primary)";
            document.getElementById('displayExpiry').innerText = new Date(user.expiryTime).toLocaleString('ar-EG');
        } else {
            alert("هذا الجهاز غير مسجل في قاعدة البيانات المحلية.");
            card.style.display = 'none';
        }
    }

    function toggleBan() {
        const id = document.getElementById('displayId').innerText;
        let data = JSON.parse(localStorage.getItem("DEVICE_DB_" + id));
        
        // إذا كان نشط نجعله محظور (2) وإذا كان محظور نعيده نشط (1)
        data.status = (data.status === 2) ? 1 : 2;
        localStorage.setItem("DEVICE_DB_" + id, JSON.stringify(data));
        
        alert(data.status === 2 ? "تم حظر الجهاز بنجاح" : "تم إلغاء الحظر");
        searchUser(); // تحديث الواجهة
    }

    function removeSubscription() {
        if (!confirm("هل أنت متأكد من حذف بيانات الاشتراك لهذا الجهاز؟")) return;
        
        const id = document.getElementById('displayId').innerText;
        const user = JSON.parse(localStorage.getItem("DEVICE_DB_" + id));
        
        if (user && user.code) {
            localStorage.removeItem("CODE_USED_" + user.code); // تحرير الكود للاستخدام مرة أخرى
        }
        localStorage.removeItem("DEVICE_DB_" + id);
        
        alert("تمت إزالة الاشتراك بنجاح.");
        document.getElementById('resultCard').style.display = 'none';
        updateStats();
    }

    window.onload = updateStats;
</script>

</body>
</html>
