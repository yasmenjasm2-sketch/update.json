<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | نظام fawakihAI</title>
    <style>
        :root {
            --bg: #0b1121;
            --card: #151c2c;
            --primary: #10b981;
            --danger: #ef4444;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 { font-size: 22px; color: var(--primary); margin: 0; }
        .header p { font-size: 13px; color: var(--muted); }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            background: #1e293b;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: white;
            outline: none;
            font-family: monospace;
        }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            font-weight: 600;
            transition: 0.2s;
            color: white;
        }

        .btn-primary { background: var(--primary); }
        .btn-danger { background: var(--danger); width: 100%; margin-top: 10px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); width: 100%; margin-top: 10px; color: var(--muted); }

        .user-info {
            background: #0f172a;
            border-radius: 16px;
            padding: 20px;
            margin-top: 10px;
            display: none;
            border-right: 4px solid var(--primary);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .info-row span:first-child { color: var(--muted); }
        .info-row span:last-child { font-weight: 600; color: var(--text); }

        .badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            text-transform: uppercase;
        }

        .badge-active { background: rgba(16, 185, 129, 0.2); color: var(--primary); }
        .badge-banned { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🛡️ لوحة الإدارة الذكية</h1>
        <p>التحكم في بصمة الجهاز واشتراكات المستخدمين</p>
    </div>

    <div class="search-section">
        <input type="text" id="targetId" placeholder="أدخل Device ID هنا...">
        <button class="btn btn-primary" onclick="findUser()">بحث</button>
    </div>

    <div id="userCard" class="user-info">
        <div class="info-row">
            <span>حالة الجهاز:</span>
            <span id="statusBadge" class="badge"></span>
        </div>
        <div class="info-row">
            <span>الكود المستخدم:</span>
            <span id="resCode">---</span>
        </div>
        <div class="info-row">
            <span>تاريخ الانتهاء:</span>
            <span id="resExpiry">---</span>
        </div>
        
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;">
        
        <button id="banBtn" class="btn btn-danger" onclick="toggleBan()">حظر المستخدم فوراً</button>
        <button class="btn btn-outline" onclick="resetUser()">إعادة تعيين (حذف الاشتراك)</button>
    </div>

    <div id="noData" style="display:none; text-align:center; color:var(--danger); font-size:14px; margin-top:10px;">
        ⚠️ لم يتم العثور على أي بيانات لهذا الجهاز.
    </div>
</div>

<script>
    function findUser() {
        const deviceId = document.getElementById('targetId').value.trim();
        const rawData = localStorage.getItem("DEVICE_DB_" + deviceId);
        const card = document.getElementById('userCard');
        const noData = document.getElementById('noData');

        if (rawData) {
            const data = JSON.parse(rawData);
            card.style.display = 'block';
            noData.style.display = 'none';

            // تحديث الواجهة
            document.getElementById('resCode').innerText = data.code || "تفعيل تلقائي";
            document.getElementById('resExpiry').innerText = new Date(data.expiryTime).toLocaleString('ar-EG');
            
            const badge = document.getElementById('statusBadge');
            const banBtn = document.getElementById('banBtn');
            
            if (data.status === 2) {
                badge.innerText = "محظور";
                badge.className = "badge badge-banned";
                banBtn.innerText = "إلغاء الحظر عن الجهاز";
                banBtn.style.background = "var(--primary)";
            } else {
                badge.innerText = "نشط";
                badge.className = "badge badge-active";
                banBtn.innerText = "حظر المستخدم فوراً";
                banBtn.style.background = "var(--danger)";
            }
        } else {
            card.style.display = 'none';
            noData.style.display = 'block';
        }
    }

    function toggleBan() {
        const deviceId = document.getElementById('targetId').value.trim();
        let data = JSON.parse(localStorage.getItem("DEVICE_DB_" + deviceId));
        
        // تبديل الحالة بين 1 (نشط) و 2 (محظور)
        data.status = (data.status === 2) ? 1 : 2;
        
        localStorage.setItem("DEVICE_DB_" + deviceId, JSON.stringify(data));
        alert(data.status === 2 ? "تم حظر الجهاز بنجاح!" : "تم إلغاء الحظر.");
        findUser(); // تحديث العرض
    }

    function resetUser() {
        if (!confirm("هل أنت متأكد؟ سيتم حذف اشتراك هذا الجهاز تماماً وسيطلب منه كود جديد عند الدخول.")) return;
        
        const deviceId = document.getElementById('targetId').value.trim();
        const data = JSON.parse(localStorage.getItem("DEVICE_DB_" + deviceId));
        
        if (data && data.code) {
            localStorage.removeItem("CODE_USED_" + data.code);
        }
        localStorage.removeItem("DEVICE_DB_" + deviceId);
        
        alert("تم مسح بيانات الجهاز.");
        document.getElementById('userCard').style.display = 'none';
        document.getElementById('targetId').value = '';
    }
</script>

</body>
</html>
