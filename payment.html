<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b1121">
    <title>الدفع والاشتراك</title>
    <style>
        :root {
            --bg-color: #0b1121; --card-bg: #151c2c; --primary: #10b981;
            --text-main: #f8fafc; --text-muted: #94a3b8; --paypal-color: #0070ba;
        }
        body { font-family: system-ui, sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .app-container { background: var(--card-bg); padding: 40px 24px; border-radius: 28px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); width: 85%; max-width: 340px; text-align: center; margin: auto; animation: slideUp 0.6s ease; position: relative; }
        .app-icon { width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        h2 { margin: 0 0 8px 0; font-size: 22px; }
        p.subtitle { font-size: 14px; color: var(--text-muted); margin: 0 0 20px 0; line-height: 1.5; }
        
        .main-btn { width: 100%; padding: 16px; border: none; border-radius: 16px; color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; display: inline-block; box-sizing: border-box; text-decoration: none; margin-bottom: 15px;}
        .paypal-btn { background: var(--paypal-color); }
        .submit-btn { background: var(--primary); }
        .submit-btn:disabled { background: #475569; cursor: not-allowed; }
        
        .file-label { display: block; background: #1e293b; padding: 15px; border-radius: 16px; border: 1.5px dashed var(--primary); color: var(--primary); cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        .top-back { position: absolute; top: 15px; right: 15px; color: var(--text-muted); text-decoration: none; font-size: 20px; }
        .error { color: #ef4444; font-size: 13px; display: none; padding: 10px; background: rgba(239, 68, 68, 0.1); border-radius: 10px; }
        
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(16, 185, 129, 0.2); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes slideUp { 0% { transform: translateY(30px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container" id="paymentView">
    <a href="index.html" class="top-back">🔙</a>
    <div class="app-icon" style="background: linear-gradient(135deg, var(--paypal-color), #1546a0);">💳</div>
    <h2>شراء اشتراك</h2>
    <p class="subtitle">اضغط للدفع ثم أرفق إيصال بايبال ليتم إدخالك للتطبيق تلقائياً.</p>

    <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=hamzaelhumada@gmail.com&amount=33&currency_code=USD&item_name=App%20Subscription" target="_blank" class="main-btn paypal-btn">
        ادفع 33$ الآن عبر PayPal
    </a>

    <label class="file-label">
        📎 إرفاق صورة الإيصال
        <input type="file" id="payFileInput" accept="image/*" style="display: none;" onchange="updateFileName()">
    </label>
    <div id="payFileName" style="font-size: 12px; color: var(--primary); margin-bottom: 15px;"></div>

    <button class="main-btn submit-btn" id="paySubmitBtn" onclick="sendPayment()">إرسال الإيصال</button>
    <div id="payError" class="error"></div>
</div>

<div class="app-container" id="waitingView" style="display: none;">
    <div class="app-icon" style="background: transparent;">⏳</div>
    <h2>جاري التحقق...</h2>
    <p class="subtitle">تم إرسال الإيصال. يرجى البقاء في هذه الصفحة.<br>سيتم تفعيل حسابك وإرجاعك تلقائياً.</p>
    <div class="spinner"></div>
    <div style="font-size: 11px; color: #64748b; margin-top: 20px;" id="userIdDisplay"></div>
</div>

<div class="app-container" id="securityView" style="display: none;">
    <div class="app-icon" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444;">🚫</div>
    <h2 style="color: #ef4444;">خطأ في الاستجابة</h2>
    <p class="subtitle">عدم استجابة السيرفر، يرجى إخبار المطور.</p>
    <button class="main-btn" style="background: #334155; margin-top: 20px;" onclick="window.history.back()">🔙 رجوع للشاشة السابقة</button>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const rawDeviceId = urlParams.get('device_id');
    
    // وضع الأمان: إذا كان الرابط لا يحتوي على device_id فهذا يعني أنه تم فتحه من متصفح عادي
    if (!rawDeviceId || rawDeviceId.trim() === "") {
        document.getElementById('paymentView').style.display = 'none';
        document.getElementById('securityView').style.display = 'block';
    } else {
        // تشغيل الأكواد العادية فقط إذا اجتاز فحص الأمان
        const appDeviceId = rawDeviceId;
        
        const ENC_BOT_TOKEN = "NzU2NjI0OTE3NzpBQUc4REZyOUl1bFpLa1R0ZVZGSGM5VEZwNXFuTUo0c09WQQ==";
        const ENC_CHAT_ID = "NTk5ODI1MDM2Nw==";
        const BOT_TOKEN = atob(ENC_BOT_TOKEN);
        const CHAT_ID = atob(ENC_CHAT_ID);
        
        if (!localStorage.getItem("fawakih_user_id")) {
            localStorage.setItem("fawakih_user_id", "ID-" + Math.floor(10000 + Math.random() * 90000));
        }
        const telegramUserId = localStorage.getItem("fawakih_user_id");
        let isPolling = false;

        document.getElementById('userIdDisplay').innerText = "User ID: " + telegramUserId;

        window.updateFileName = function() {
            const input = document.getElementById("payFileInput");
            document.getElementById("payFileName").textContent = input.files.length > 0 ? "تم إرفاق: " + input.files[0].name : "";
        };

        window.sendPayment = async function() {
            const fileInput = document.getElementById("payFileInput");
            const errorDiv = document.getElementById("payError");
            const btn = document.getElementById("paySubmitBtn");
            
            if (fileInput.files.length === 0) {
                errorDiv.innerText = "الرجاء إرفاق الإيصال!";
                errorDiv.style.display = "block"; return;
            }

            btn.disabled = true; btn.textContent = "جاري الإرسال..."; errorDiv.style.display = "none";
            
            const caption = `💰 *اشتراك PayPal جديد*\n\nالمستخدم: \`${telegramUserId}\`\nالجهاز: \`${appDeviceId}\`\n\nللرد والتفعيل، أرسل:\n\`${telegramUserId} تفعيل\``;
            const formData = new FormData();
            formData.append("chat_id", CHAT_ID);
            formData.append("parse_mode", "Markdown");
            formData.append("photo", fileInput.files[0]);
            formData.append("caption", caption);

            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: "POST", body: formData });
                if (res.ok) {
                    document.getElementById('paymentView').style.display = 'none';
                    document.getElementById('waitingView').style.display = 'block';
                    isPolling = true; pollTelegram();
                } else throw new Error();
            } catch (e) {
                errorDiv.innerText = "فشل الإرسال. تأكد من الإنترنت."; errorDiv.style.display = "block";
                btn.disabled = false; btn.textContent = "إرسال الإيصال";
            }
        };

        async function pollTelegram() {
            let offset = localStorage.getItem("fawakih_tg_offset") || 0;
            while (isPolling) {
                try {
                    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${offset}&timeout=30`);
                    if (res.ok) {
                        const data = await res.json();
                        for (let item of data.result) {
                            offset = item.update_id + 1;
                            localStorage.setItem("fawakih_tg_offset", offset);
                            
                            if (item.message && item.message.text) {
                                const text = item.message.text;
                                if (text.includes(telegramUserId) && text.includes("تفعيل")) {
                                    isPolling = false;
                                    
                                    // توليد اشتراك 30 يوم وحفظه في الجهاز
                                    let autoCode = "PAY-" + Math.floor(1000 + Math.random() * 9000);
                                    let finalExpiryTime = Date.now() + (30 * 24 * 60 * 60 * 1000); // 30 Days
                                    
                                    localStorage.setItem("CODE_USED_" + autoCode, appDeviceId);
                                    localStorage.setItem("DEVICE_DB_" + appDeviceId, JSON.stringify({
                                        status: 1, expiryTime: finalExpiryTime, code: autoCode
                                    }));
                                    
                                    // إرجاع المستخدم للملف الرئيسي ليتم إدخاله للتطبيق
                                    window.location.href = "index.html?device_id=" + encodeURIComponent(appDeviceId);
                                    return;
                                }
                            }
                        }
                    }
                } catch (e) {}
                await new Promise(r => setTimeout(r, 4000));
            }
        }
    }
</script>
</body>
</html>
